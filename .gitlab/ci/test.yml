test:phpstan:
  stage: test
  needs: ['build']
  only:
    - merge_requests
  image: dockware/dev:latest
  variables:
    PHP_VERSION: '8.0'
  artifacts:
    paths:
      - dev
  script:
    - cp -r dev /var/www/html/custom/plugins/ElioFactFinder
    - cd /var/www/html/custom/plugins/ElioFactFinder
    - make stan

test:php8.0:
  stage: test
  needs: ['build']
  only:
    - merge_requests
  image: dockware/dev:latest
  variables:
    PHP_VERSION: '8.0'
  artifacts:
    paths:
      - dev
  script:
    - bash .gitlab/scripts/test_phpunit.sh

test:php7.4:
  stage: test
  needs: ['build']
  only:
    - merge_requests
  image: dockware/dev:latest
  variables:
    PHP_VERSION: '7.4'
  artifacts:
    paths:
      - dev
  script:
    - bash .gitlab/scripts/test_phpunit.sh
