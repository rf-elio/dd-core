build:
  stage: build
  only:
    - merge_requests
    - tags
  image: php:8.0
  artifacts:
    paths:
      - dev
      - prod
    expire_in: 1 hour
  before_script:
    - bash .gitlab/scripts/docker_install.sh > /dev/null
  script:
    - bash .gitlab/scripts/build_prepare_dir.sh > /dev/null
    - cp -r build dev
    - cp -r build prod
    - cd ./dev && make dev && bash ../.gitlab/scripts/build_clean_dir.sh && cd ..
    - cd ./prod && make prod && bash ../.gitlab/scripts/build_clean_dir.sh && cd ..