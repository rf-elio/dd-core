upload:
  stage: release
#  needs: ['test:phpstan', 'test:php7.4', 'test:php8.0']
  needs: ['build']
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  artifacts:
    paths:
      - build
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ./build/prod.zip "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/prod.zip"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file ./build/dev.zip "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/dev.zip"

release_create:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG                  # Run this job when a tag is created manually
  script:
    - echo "running release_job"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'Created using the release-cli $EXTRA_DESCRIPTION'  # $EXTRA_DESCRIPTION must be defined
    tag_name: '$CI_COMMIT_TAG'                                       # elsewhere in the pipeline.
    ref: '$CI_COMMIT_TAG'
    assets: # Optional, multiple asset links
      links:
        - name: 'prod.zip'
          url: '${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/prod.zip'
        - name: 'dev.zip'
          url: '${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/dev.zip'