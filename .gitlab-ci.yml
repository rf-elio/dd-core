stages:
  - build
  - test
  - release

build:
  stage: build
  image: php:8.0
  artifacts:
    paths:
      - dev
      - prod
    expire_in: 1 hour
  before_script:
    - bash .ci/docker_install.sh > /dev/null
  script:
    - bash .ci/build_prepare_dir.sh > /dev/null
    - cp -r build dev
    - cp -r build prod
    - cd ./dev && make dev && bash ../.ci/build_clean_dir.sh && cd ..
    - cd ./prod && make prod && bash ../.ci/build_clean_dir.sh && cd ..

test:phpstan:
  stage: test
  needs: ['build']
  only:
    - merge_requests
  image: dockware/dev:latest
  variables:
    PHP_VERSION: '8.0'
  artifacts:
    paths:
      - dev
  script:
    - cp -r dev /var/www/html/custom/plugins/ElioFactFinder
    - cd /var/www/html/custom/plugins/ElioFactFinder
    - make stan

test:php8.0:
  stage: test
  needs: ['build']
  only:
    - merge_requests
  image: dockware/dev:latest
  variables:
    PHP_VERSION: '8.0'
  artifacts:
    paths:
      - dev
  script:
    - bash .ci/test_phpunit.sh

test:php7.4:
  stage: test
  needs: ['build']
  only:
    - merge_requests
  image: dockware/dev:latest
  variables:
    PHP_VERSION: '7.4'
  artifacts:
    paths:
      - dev
  script:
    - bash .ci/test_phpunit.sh

release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "Running the release job."
  release:
    tag_name: ${MAJOR}_${MINOR}_${REVISION}
    name: 'Release $CI_COMMIT_TAG'
    description: 'Release created using the release-cli.'
