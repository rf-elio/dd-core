stages:
  - build
  - test
  - release

variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release"

build:
  stage: build
  only:
    - merge_requests
    - tags
  image: php:8.0
  artifacts:
    paths: ["dev", "prod", "build"]
    expire_in: 1 hour
  before_script:
    - bash .gitlab/scripts/composer_install.sh > /dev/null
  script:
    - bash .gitlab/scripts/build_prepare_dir.sh > /dev/null
    - cp -r ./prepare ./build/dev
    - cd ./build/dev && ls -la && make dev && bash ../../.gitlab/scripts/build_clean_dir.sh && cd ../../

    - cp -r ./prepare ./build/prod
    - cd ./build/dev && make dev && bash ../../.gitlab/scripts/build_clean_dir.sh && cd ..
    - cd ./build/prod && make prod && bash ../../.gitlab/scripts/build_clean_dir.sh && cd ..
    - zip -r ./build/dev.zip ./build/dev
    - zip -r ./build/prod.zip ./build/prod

test:phpstan:
  stage: test
  needs: ['build']
  only:
    - merge_requests
    - tags
  image: dockware/dev:latest
  variables:
    PHP_VERSION: '8.0'
  artifacts:
    paths:
      - dev
      - "./phpstan-report.json"
    when: always
    reports:
      codequality: phpstan-report.json
  script:
    - ls -la
    - cp -r dev /var/www/html/custom/plugins/ElioFactFinder
    - cd /var/www/html/custom/plugins/ElioFactFinder
    - make stan-gitlab
    - cp phpstan-report.json /var/www/html/phpstan-report.json
    - ls -la
    - cd /var/www/html/
    - ls -la

